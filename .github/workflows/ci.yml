name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel older runs of the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# The deploy job publishes the production image to GitHub Container Registry.
permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # 32 bytes encoded as 64 hexadecimal characters. Several route tests
      # keep an already-provided key instead of generating one.
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests
        run: npx vitest run --exclude="tests/e2e/**"

      - name: Build (Next.js production)
        run: npm run build

      - name: Security audit (advisory — does not fail the run)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  deploy:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_BUILD_ID=${{ github.sha }}
            NEXT_PUBLIC_BUILD_TIME=${{ github.event.head_commit.timestamp }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max