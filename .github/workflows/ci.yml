name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel older runs of the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      ENCRYPTION_KEY: ci_test_encryption_key_64_hex_chars_____________________________padding
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests
        run: npx vitest run --exclude="tests/e2e/**"

      - name: Build (Next.js production)
        run: npm run build

      - name: Security audit (advisory — does not fail the run)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  deploy:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test  # Ensure tests pass before deploying
    if: github.ref == 'refs/heads/main'  # Only deploy on the main branch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/9nansoft/nan-lrms:${GITHUB_SHA} .

      - name: Push Docker image to GitHub Container Registry
        run: docker push ghcr.io/9nansoft/nan-lrms:${GITHUB_SHA}